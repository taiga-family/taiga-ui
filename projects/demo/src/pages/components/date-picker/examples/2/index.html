<tui-textfield>
    <label tuiLabel>Select date</label>
    <input
        tuiInputDate
        [(ngModel)]="value"
    />
    <tui-date-picker
        *tuiDropdown
        [contentDay]="day"
        [contentMonth]="month"
    />
    <ng-template
        #day
        let-date
    >
        <span tuiTitle>
            {{ date.day }}
            <span tuiSubtitle>{{ getLabel(date) }}</span>
        </span>
    </ng-template>
    <ng-template
        #month
        let-date
    >
        <span tuiTitle>
            {{ date.toUtcNativeDate() | date: 'MMM' }}
            <span tuiSubtitle>{{ date.year }}</span>
        </span>
    </ng-template>
</tui-textfield>
