<tui-textfield>
    <label tuiLabel>Very long label that you must display without truncating</label>
    <input
        tuiInput
        [(ngModel)]="value"
    />

<tui-textfield multi>
    <label tuiLabel>Very long label that you must display without truncating</label>
    <input
        tuiInputChip
        [(ngModel)]="chips"
    />
</tui-textfield>
