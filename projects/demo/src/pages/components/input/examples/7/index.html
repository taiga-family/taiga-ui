<tui-textfield>
    <label
        tuiFade
        tuiLabel
    >
        Very long label that you must display without truncating
    </label>
    <input
        tuiFade
        tuiInput
        [(ngModel)]="value"
    />
</tui-textfield>

<tui-textfield multi>
    <label
        tuiFade
        tuiLabel
    >
        Very long label that you must display without truncating
    </label>
    <input
        tuiInputChip
        [(ngModel)]="chips"
    />
</tui-textfield>
