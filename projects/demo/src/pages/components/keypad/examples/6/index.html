<button
    iconStart="@tui.phone"
    tuiButton
    type="button"
    (click)="open.set(true)"
>
    Open Phone Dialer
</button>

<ng-template
    let-observer
    [tuiPopoutOptions]="{pip: true, features: {width: 310, height: 540}}"
    [(tuiPopout)]="open"
>
    @if (isCalling()) {
        <main>
            <div
                size="xl"
                tuiAvatar="@tui.user"
            ></div>
            <header tuiHeader="body-l">
                <hgroup tuiTitle>
                    <h1>{{ phoneNumber() }}</h1>
                    <p tuiSubtitle>Calling...</p>
                </hgroup>
            </header>
            <section>
                <button
                    appearance="warning"
                    aria-label="Headset"
                    size="l"
                    title="Headset"
                    tuiAvatar="@tui.headset"
                    type="button"
                ></button>
                <button
                    appearance="negative"
                    aria-label="Hang up"
                    size="l"
                    title="Hang up"
                    tuiAvatar="@tui.phone-off"
                    type="button"
                    (click)="closeCall()"
                ></button>
            </section>
        </main>
    } @else {
        <div class="phone-dialer">
            <input
                #input
                tuiAutoFocus
                tuiKeypadInput
                class="input"
                [ngModel]="phoneNumber()"
                (ngModelChange)="phoneNumber.set($event)"
            />

            <tui-keypad
                [keys]="keys"
                [(value)]="phoneNumber"
                (key)="refocus()"
            />

            <div class="actions">
                <button
                    appearance="flat"
                    size="m"
                    tuiButton
                    type="button"
                    (click)="clear()"
                >
                    Clear
                </button>

                <button
                    appearance="positive"
                    iconStart="@tui.phone"
                    size="m"
                    tuiButton
                    type="button"
                    (click)="call()"
                >
                    Call
                </button>
            </div>
        </div>
    }
</ng-template>
