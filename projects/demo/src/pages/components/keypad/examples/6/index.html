<button
    iconStart="@tui.calculator"
    tuiButton
    type="button"
    (click)="open.set(true)"
>
    Open Calculator
</button>

<ng-template
    [tuiPopout]="open()"
    [tuiPopoutOptions]="{pip: true, features: {width: 300, height: 450}}"
    (tuiPopoutChange)="open.set($event)"
>
    <main class="calculator">
        <input
            #input
            inputmode="none"
            readonly
            tuiAutoFocus
            class="input"
            [value]="displayValue()"
            (keydown)="onKeydown($event)"
        />

        <tui-keypad [columns]="4">
            <button
                tuiKeypadButton
                type="button"
                (click)="onKey('clear')"
            >
                AC
            </button>
            <button
                tuiKeypadButton
                type="button"
                (click)="onKey('(')"
            >
                (
            </button>
            <button
                tuiKeypadButton
                type="button"
                (click)="onKey(')')"
            >
                )
            </button>
            <button
                aria-label="Divide"
                tuiKeypadButton
                type="button"
                (click)="onKey('÷')"
            >
                <tui-icon icon="@tui.divide" />
            </button>

            <button
                tuiKeypadButton
                type="button"
                (click)="onKey('7')"
            >
                7
            </button>
            <button
                tuiKeypadButton
                type="button"
                (click)="onKey('8')"
            >
                8
            </button>
            <button
                tuiKeypadButton
                type="button"
                (click)="onKey('9')"
            >
                9
            </button>
            <button
                aria-label="Multiply"
                tuiKeypadButton
                type="button"
                (click)="onKey('×')"
            >
                <tui-icon icon="@tui.x" />
            </button>

            <button
                tuiKeypadButton
                type="button"
                (click)="onKey('4')"
            >
                4
            </button>
            <button
                tuiKeypadButton
                type="button"
                (click)="onKey('5')"
            >
                5
            </button>
            <button
                tuiKeypadButton
                type="button"
                (click)="onKey('6')"
            >
                6
            </button>
            <button
                aria-label="Subtract"
                tuiKeypadButton
                type="button"
                (click)="onKey('-')"
            >
                <tui-icon icon="@tui.minus" />
            </button>

            <button
                tuiKeypadButton
                type="button"
                (click)="onKey('1')"
            >
                1
            </button>
            <button
                tuiKeypadButton
                type="button"
                (click)="onKey('2')"
            >
                2
            </button>
            <button
                tuiKeypadButton
                type="button"
                (click)="onKey('3')"
            >
                3
            </button>
            <button
                aria-label="Add"
                tuiKeypadButton
                type="button"
                (click)="onKey('+')"
            >
                <tui-icon icon="@tui.plus" />
            </button>

            <button
                tuiKeypadButton
                type="button"
                (click)="onKey('0')"
            >
                0
            </button>
            <button
                tuiKeypadButton
                type="button"
                (click)="onKey('.')"
            >
                .
            </button>
            <button
                aria-label="Backspace"
                tuiKeypadButton
                type="button"
                (click)="onKey('backspace')"
                (longtap)="onKey('clear')"
            >
                <tui-icon icon="@tui.delete" />
            </button>
            <button
                aria-label="Equals"
                tuiKeypadButton
                type="button"
                (click)="onKey('enter')"
            >
                <tui-icon icon="@tui.equal" />
            </button>
        </tui-keypad>
    </main>
</ng-template>
