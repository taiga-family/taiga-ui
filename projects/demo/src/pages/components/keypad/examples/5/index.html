<div
    tuiResizable
    class="container"
>
    <tui-keypad>
        @for (digit of digits; track digit) {
            <button
                tuiKeypadButton
                type="button"
                (click)="append(digit)"
            >
                {{ digit }}
            </button>
        }

        <div></div>

        <button
            tuiKeypadButton
            type="button"
            (click)="append('0')"
        >
            0
        </button>

        <button
            aria-label="Backspace"
            tuiKeypadButton
            type="button"
            (click)="backspace()"
            (longtap)="clear()"
        >
            <tui-icon icon="@tui.delete" />
        </button>
    </tui-keypad>

    <div
        class="handle"
        [tuiResizer]="[1, 1]"
    ></div>
</div>
