<tui-doc-page
    header="ThumbnailCard"
    package="ADDON-COMMERCE"
    type="components"
>
    <ng-template pageTab>
        <p>Customizable credit card thumbnail</p>

        @for (example of examples; track example) {
            <tui-doc-example
                [component]="$index + 1 | tuiComponent"
                [content]="$index + 1 | tuiExample"
                [heading]="example"
            />
        }
    </ng-template>

    <ng-template pageTab>
        <tui-doc-demo>
            <span
                tuiThumbnailCard
                [iconEnd]="controlIcons.iconEnd"
                [iconStart]="controlIcons.iconStart"
                [paymentSystem]="paymentSystem"
                [size]="size"
                [style.background]="background"
            >
                {{ contentProjection }}
            </span>
        </tui-doc-demo>
        <table tuiDocAPI>
            <tbody
                #controlIcons
                tuiDocIcons
            ></tbody>
            <tr
                name="[paymentSystem]"
                tuiDocAPIItem
                type="TuiPaymentSystem | null"
                [items]="paymentSystemVariants"
                [(value)]="paymentSystem"
            ></tr>
            <tr
                name="[size]"
                tuiDocAPIItem
                type="TuiSizeXS | TuiSizeL"
                [items]="sizeVariants"
                [(value)]="size"
            ></tr>
            <tr>
                <td colspan="3">
                    <span tuiTitle>
                        <strong>CSS customization</strong>
                    </span>
                </td>
            </tr>
            <tr
                name="[style.background]"
                tuiDocAPIItem
                type="string"
                [(value)]="background"
            ></tr>
        </table>

        <h3>Content projection</h3>
        <table tuiDocAPI>
            <tr
                name="[ng-content]"
                tuiDocAPIItem
                type="string"
                [(value)]="contentProjection"
            >
                content inside
            </tr>
        </table>
        <tui-doc-code [code]="`<span tuiThumbnailCard>${contentProjection}</span>`" />
    </ng-template>
</tui-doc-page>
