<div class="default">
    <tui-segmented [(activeItemIndex)]="activeItemIndex">
        <button type="button">IOS</button>
        <button type="button">Android</button>
    </tui-segmented>

    <div
        tuiDynamicHeaderContainer
        class="container"
        [tuiPlatform]="activeItemIndex ? 'android' : 'ios'"
    >
        <ng-container *polymorpheusOutlet="content" />
    </div>
</div>

<div
    #container
    tuiDynamicHeaderContainer
    tuiPlatform="ios"
    waIntersectionRootMargin="-120px 0px 1000000% 0px"
    class="container tui-liquid-glass"
    [class.tui-liquid-glass_blur]="container.scrollTop > 0"
    (scroll)="(0)"
>
    <ng-container *polymorpheusOutlet="content" />
</div>
