<tui-textfield
    #textfield
    tuiChevron
    [content]="value && !textfield.focused() ? content : ''"
    [stringify]="stringify"
>
    <input
        placeholder="Choose a card"
        tuiComboBox
        [(ngModel)]="value"
    />

    <tui-data-list-wrapper
        *tuiDropdown
        [itemContent]="content"
        [items]="cards | tuiFilterByInput: filter"
    />
</tui-textfield>

<ng-template
    #content
    let-card
>
    <div class="card">
        <span
            tuiThumbnailCard
            [paymentSystem]="card.paymentSystem"
        >
            {{ card.number.slice(-4) }}
        </span>

        {{ card.name }}
    </div>
</ng-template>
