@for (size of sizes; track $index) {
    <p>Size: {{ size | uppercase }}</p>

    <div [tuiFile]="size">
        <img
            alt=""
            src="assets/images/avatar.jpg"
        />

        <div tuiTitle>
            filename.png
            <div tuiSubtitle>30 Mb</div>
        </div>

        <button
            appearance=""
            size="xs"
            tabindex="0"
            tuiButtonX
        >
            Close
        </button>
    </div>

    <div [tuiFile]="size">
        <tui-icon
            icon="@tui.image"
            [style.color]="'var(--tui-chart-categorical-16)'"
        />

        <div tuiTitle>
            filename.png
            <div tuiSubtitle>30 Mb</div>
        </div>

        <button
            appearance=""
            size="xs"
            tabindex="0"
            tuiButtonX
        >
            Close
        </button>
    </div>

    <div [tuiFile]="size">
        <label tuiProgressLabel>
            <tui-progress-circle
                size="xxs"
                [max]="100"
                [style.--tui-thickness]="'0.175rem'"
                [value]="60"
            />

            @if (size !== 's') {
                <button
                    appearance=""
                    iconStart="@tui.x"
                    size="xs"
                    tuiIconButton
                    type="button"
                    [style.border-radius.%]="100"
                    [style.color]="'var(--tui-background-accent-1)'"
                >
                    Cancel
                </button>
            }
        </label>

        <div tuiTitle>
            filename.png
            <div tuiSubtitle>30 Mb</div>
        </div>

        <button
            appearance=""
            size="xs"
            tabindex="0"
            tuiButtonX
        >
            Close
        </button>
    </div>
}
