@for (platform of platforms; track $index) {
    <h2>{{ platform === 'web' ? 'Desktop' : platform }}</h2>

    <div [tuiPlatform]="platform">
        <div
            orientation="vertical"
            tuiFile
        >
            <img
                alt=""
                src="assets/images/avatar.jpg"
            />

            <div tuiTitle>
                filename.png
                <div tuiSubtitle>30 Mb</div>
            </div>

            <button
                appearance=""
                size="xs"
                tabindex="0"
                tuiButtonX
            >
                Close
            </button>
        </div>
        <div
            orientation="vertical"
            tuiFile
        >
            <tui-icon
                icon="@tui.image"
                [style.color]="'var(--tui-chart-categorical-16)'"
            />

            <div tuiTitle>
                filename.png
                <div tuiSubtitle>30 Mb</div>
            </div>

            <button
                appearance=""
                size="xs"
                tabindex="0"
                tuiButtonX
            >
                Close
            </button>
        </div>

        <div
            orientation="vertical"
            tuiFile
        >
            <label tuiProgressLabel>
                <tui-progress-circle
                    size="xs"
                    [max]="100"
                    [style.--tui-thickness]="'0.175rem'"
                    [value]="60"
                />

                <button
                    appearance=""
                    iconStart="@tui.x"
                    size="xs"
                    tuiIconButton
                    type="button"
                    [style.border-radius.%]="100"
                    [style.color]="'var(--tui-background-accent-1)'"
                >
                    Cancel
                </button>
            </label>

            <div tuiTitle>
                filename.png
                <div tuiSubtitle>30 Mb</div>
            </div>

            <button
                appearance=""
                size="xs"
                tabindex="0"
                tuiButtonX
            >
                Close
            </button>
        </div>
    </div>
}
