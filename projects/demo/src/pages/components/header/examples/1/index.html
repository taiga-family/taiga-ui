            <h2>Title</h2>
            <p tuiSubtitle>Subtitle</p>
        </hgroup>
        <aside tuiAccessories>
            <tui-badge-notification [size]="toBadgeSize(size)">1</tui-badge-notification>
            <button
                tuiButton

                [size]="toButtonSize(size)"
            >
                Button
            </button>
        </aside>
    </header>
    <div tuiDescription>

        standard dummy text ever since the 1500s.
