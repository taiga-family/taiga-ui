<div
    class="field"
    [class.field_submitting]="mode() === 'submitting'"
>
    <tui-loader
        class="loader"
        [inheritColor]="true"
        [loading]="mode() === 'submitting'"
    />
    <tui-textfield>
        <input
            tuiPincode
            [mode]="mode()"
            [(ngModel)]="pin"
        />
    </tui-textfield>
</div>
