<button
    size="m"
    tuiButton
    type="button"
    (click)="open = true"
>
    Show TableBar
</button>

<tui-action-bar
    *tuiPopup="open"
    size="s"
>
    <span [style.width.%]="isMobile() ? 100 : null">Table bar opened</span>

    <button
        appearance="secondary-grayscale"
        iconStart="@tui.trash"
        tuiButton
        type="button"
        (click)="open = false"
    >
        Remove
    </button>
    <button
        iconStart="@tui.x"
        tuiIconButton
        type="button"
        [appearance]="isMobile() ? 'secondary-grayscale' : 'icon'"
        (click)="open = false"
    >
        Close
    </button>
</tui-action-bar>
