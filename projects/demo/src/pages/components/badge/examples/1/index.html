<p>
    <input
        tuiSlider
        type="range"
        [max]="11"
        [min]="0"
        [(ngModel)]="value"
        (ngModelChange)="onValueChange($event)"
    />
</p>
@for (size of sizes; track $index) {
    <section tuiPlatform="ios">
        <span
            tuiBadge
            [size]="size"
        >
            Text
        </span>
        <span
            iconStart="@tui.heart-filled"
            tuiBadge
            [size]="size"
        >
            Text + icon
        </span>
        <tui-icon
            iconStart="@tui.heart-filled"
            tuiBadge
            [size]="size"
        />
        <img
            alt="User"
            src="assets/images/avatar.jpg"
            tuiBadge
            [size]="size"
        />
    </section>
}
