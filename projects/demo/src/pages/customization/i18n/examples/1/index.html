<button
    appearance="secondary-grayscale"
    size="s"
    tuiButton
    tuiButtonSelect
    tuiChevron
    type="button"
    [(ngModel)]="language"
    (ngModelChange)="switcher.setLanguage($event)"
>
    {{ language }}
    <tui-data-list-wrapper
        *tuiDropdown
        [items]="languages"
    />
</button>
