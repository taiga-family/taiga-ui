<tui-doc-page [header]="`Guide to update Taiga UI v${tuiMajor - 1} -> v${tuiMajor}`">
    <ng-template pageTab>
        <tui-doc-example
            heading="Before you update"
            [fullsize]="true"
            [preview]="false"
        >
            <migration-guide-prerequisites />
        </tui-doc-example>

        <tui-doc-example
            heading="Updating"
            [fullsize]="true"
            [preview]="false"
        >
            <migration-guide-actions />
        </tui-doc-example>

        <tui-doc-example
            heading="Troubleshooting"
            [fullsize]="true"
            [preview]="false"
        >
            <migration-guide-troubleshooting />
        </tui-doc-example>
    </ng-template>
</tui-doc-page>
