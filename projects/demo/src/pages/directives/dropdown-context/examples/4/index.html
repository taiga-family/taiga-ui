<div
    tuiDropdownContext
    class="container"
    [tuiDropdown]="contextMenu"
>
    <p class="description">
        Right-click this area, then open the select. The select dropdown should keep the textfield width.
    </p>

    <tui-textfield>
        <input
            placeholder="Choose framework"
            tuiSelect
            [(ngModel)]="value"
        />

        <tui-data-list-wrapper
            *tuiDropdown
            [items]="items"
        />
    </tui-textfield>
</div>

<ng-template #contextMenu>
    <tui-data-list>
        <button
            tuiOption
            type="button"
        >
            Context action
        </button>

        <button
            tuiOption
            type="button"
        >
            Another action
        </button>
    </tui-data-list>
</ng-template>
