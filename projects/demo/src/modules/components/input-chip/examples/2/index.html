<tui-textfield multi>
    <input
        placeholder="Enter"
        tuiInputChip
        [chip]="item"
        [(ngModel)]="value"
    />
</tui-textfield>

<div>model: {{ value }}</div>

<ng-template
    #item
    let-item
>
    <div [style.margin]="'0.25rem 0.25rem 0.25rem 0'">{{ item }}</div>
</ng-template>
