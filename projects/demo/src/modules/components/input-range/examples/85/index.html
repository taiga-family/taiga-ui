<tui-input-range
    [keySteps]="keySteps"
    [max]="max"
    [min]="min"
    [segments]="segments"
    [step]="step"
    [(ngModel)]="value"
>
    Not linear growing sliders
</tui-input-range>

<div class="ticks-labels">
    <span *ngFor="let label of ticksLabels">{{ label }}</span>
</div>

<p>
    <strong>Control value:</strong>
    <output>
        <code>{{ value | json }}</code>
    </output>
</p>
