<h2>Desktop</h2>

<section tuiPlatform="web">
    <div tuiToast>
        <tui-loader />
        <div tuiTitle>Updating...</div>
    </div>

    <div
        tuiTheme="dark"
        tuiToast
    >
        <tui-icon icon="@tui.info" />
        <div tuiTitle>Sent to print</div>
        <button
            appearance=""
            size="s"
            tuiButton
            type="button"
        >
            Cancel
        </button>
    </div>
</section>

<h2>iOS/Android</h2>

<section tuiPlatform="ios">
    <div tuiToast>
        <tui-loader />
        <div tuiTitle>Updating...</div>
    </div>

    <div
        tuiToast
        class="blue"
    >
        <tui-icon icon="@tui.circle-check" />
        <div tuiTitle>Added</div>
        <button
            appearance=""
            size="s"
            tuiButton
            type="button"
        >
            Label
        </button>
    </div>
</section>
