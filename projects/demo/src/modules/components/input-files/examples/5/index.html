<label tuiInputFiles="l">
    <input
        tuiInputFiles
        [formControl]="control"
    />
    <ng-template let-dragged>
        <ng-container *ngIf="dragged; else base">
            <tui-avatar
                appearance="secondary"
                src="@tui.droplet"
            />
            <div>
                Drop it like it's hot!
                <br />
                <br />
            </div>
        </ng-container>

        <ng-template #base>
            <tui-avatar
                appearance="secondary"
                src="@tui.cloud-upload"
            />
            <div>
                Drag and drop file here or
                <a tuiLink>click to upload</a>
            </div>
            <div class="types">PNG, JPG, JPEG, PNG, etc</div>
        </ng-template>
    </ng-template>
</label>

<tui-files class="tui-space_top-4">
    <tui-file
        [file]="file"
        [leftContent]="content"
    >
        <span class="tui-text_body-s-2">file is on checking</span>
    </tui-file>
</tui-files>

<ng-template #content>
    <tui-icon icon="@tui.clock" />
</ng-template>
