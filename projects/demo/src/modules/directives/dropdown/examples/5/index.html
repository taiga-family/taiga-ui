<tui-textfield
    tuiChevron
    tuiDropdownMobile
    [(ngModel)]="country"
>
    <label tuiLabel>Country</label>

    <tui-data-list-wrapper
        *tuiTextfieldDropdown
        new
        [items]="countries$ | async | tuiFilterByInput"
    />
</tui-textfield>

<tui-textfield
    tuiChevron
    tuiDropdownMobile="Select user"
    class="tui-space_vertical-4"
    [content]="template"
>
    <input
        placeholder="Select user"
        tuiSelect
        [(ngModel)]="user"
    />
    <tui-data-list-wrapper
        *tuiTextfieldDropdown
        new
        [itemContent]="template"
        [items]="users"
    />
</tui-textfield>

<tui-textfield
    multi
    tuiChevron
    [stringify]="stringify"
>
    <label tuiLabel>Pick more users</label>

    <input
        tuiInputChip
        [(ngModel)]="selected"
    />
    <tui-input-chip *tuiItem />
    <tui-data-list-wrapper
        tuiMultiSelectGroup
        [itemContent]="template"
        [items]="users | tuiFilterByInput"
    />
    <button
        appearance="accent"
        size="m"
        tuiButton
        tuiDropdownButton
        type="button"
        (click)="open.set(false)"
    >
        Done
    </button>

<tui-textfield class="tui-space_vertical-4">
    <label tuiLabel>Sum</label>
    <input
        prefix="$"
        tuiInputNumber
        [(ngModel)]="sum"
    />
</tui-textfield>

<ng-template
    #template
    let-user
>
    <span tuiCell>
        <tui-avatar [src]="user.url" />
        <span tuiTitle>
            <span tuiFade>{{ user.name }}</span>
            <span tuiSubtitle>
                {{ user.balance | tuiAmount: '$' : 'left' | async }}
            </span>
        </span>
    </span>
</ng-template>
