<button
    tuiButton
    tuiDropdownLimitWidth="fixed"
    tuiDropdownMobile="Input inside dropdown"
    type="button"
    class="tui-space_vertical-4"
    [style.width.%]="100"
    [tuiDropdown]="dropdown"
    [tuiDropdownOpen]="dropdownOpen()"
    (tuiDropdownOpenChange)="dropdownOpen.set($event)"
>
    Open dropdown with input

    <ng-template
        #dropdown
        let-close
    >
        <div [style.padding.rem]="1">
            <tui-textfield>
                <label tuiLabel>Input</label>
                <input
                    placeholder="Type something and tap Done"
                    tuiTextfield
                    [(ngModel)]="input"
                />
            </tui-textfield>

            <p class="tui-text_body-s tui-space_top-3">
                On iOS, tapping Done on the virtual keyboard should not close this dropdown.
            </p>

            <button
                tuiButton
                tuiDropdownButton
                type="button"
                (click)="close()"
            >
                Close
            </button>
        </div>
    </ng-template>
</button>

<tui-combo-box
    tuiDropdownMobile
    [tuiTextfieldCleaner]="true"
    [(ngModel)]="country"
>
    Country
    <tui-data-list-wrapper
        *tuiDataList
        [items]="countries$ | async | tuiFilterByInput"
    />
</tui-combo-box>

<tui-textfield
    tuiChevron
    tuiDropdownMobile="Select user"
    class="tui-space_vertical-4"
    [content]="template"
>
    <input
        placeholder="Select user"
        tuiSelect
        [(ngModel)]="user"
    />
    <tui-data-list-wrapper
        *tuiTextfieldDropdown
        new
        [itemContent]="template"
        [items]="users"
    />
</tui-textfield>

<tui-multi-select
    tuiDropdownMobile
    class="tui-space_vertical-4"
    [stringify]="stringify"
    [tuiDropdownOpen]="open()"
    [tuiTextfieldCleaner]="true"
    [tuiTextfieldLabelOutside]="true"
    [(ngModel)]="selected"
    (tuiDropdownOpenChange)="open.set($event)"
>
    Pick more users
    <ng-container *tuiDataList>
        <tui-data-list-wrapper
            tuiMultiSelectGroup
            [itemContent]="template"
            [items]="users | tuiFilterByInput"
        />
        <button
            appearance="accent"
            size="m"
            tuiButton
            tuiDropdownButton
            type="button"
            (click)="open.set(false)"
        >
            Done
        </button>
    </ng-container>
</tui-multi-select>

<tui-textfield class="tui-space_vertical-4">
    <label tuiLabel>Sum</label>
    <input
        prefix="$"
        tuiInputNumber
        [(ngModel)]="sum"
    />
</tui-textfield>

<ng-template
    #template
    let-user
>
    <span tuiCell>
        <tui-avatar [src]="user.url" />
        <span tuiTitle>
            <span tuiFade>{{ user.name }}</span>
            <span tuiSubtitle>
                {{ user.balance | tuiAmount: '$' : 'left' | async }}
            </span>
        </span>
    </span>
</ng-template>
