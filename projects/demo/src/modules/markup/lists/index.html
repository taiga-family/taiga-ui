<tui-doc-page
    header="Lists"
    type="markup"
>
    @for (example of examples; track example) {
        <tui-doc-example
            [component]="$index + 1 | tuiComponent"
            [content]="$index + 1 | tuiExample: 'html'"
            [fullsize]="true"
            [heading]="example"
            [id]="example | tuiKebab"
        />
    }
</tui-doc-page>
