<tui-multi-select
    placeholder="Ignored text"
    [formControl]="control"
    [tuiTextfieldLabelOutside]="true"
>
    Star Wars persons
    <tui-data-list-wrapper
        *tuiDataList
        tuiMultiSelectGroup
        [items]="items | tuiFilterByInput"
    />
</tui-multi-select>

<tui-textfield
    multi
    tuiChevron
>
    <input
        tuiInputChip
        tuiSelectLike
        [formControl]="control"
    />
    <tui-data-list-wrapper
        *tuiTextfieldDropdown
        new
        tuiMultiSelectGroup
        [items]="items"
    />
