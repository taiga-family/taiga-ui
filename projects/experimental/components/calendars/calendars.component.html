<header class="t-buttons">
    <button
        tabindex="-1"
        tuiIconButton
        type="button"
        class="t-chevron"
        [disabled]="start()"
        [iconStart]="icons.decrement"
        (click)="onSpin(-1)"
        (pointerdown.zoneless.prevent)="(0)"
    >
        {{ texts()[0] }}
    </button>
    <button
        tabindex="-1"
        tuiIconButton
        type="button"
        class="t-chevron"
        [disabled]="end()"
        [iconStart]="icons.increment"
        (click)="onSpin(1)"
        (pointerdown.zoneless.prevent)="(0)"
    >
        {{ texts()[1] }}
    </button>

    @if (dropdown?.nativeElement?.matches(':not(input)')) {
        <tui-date-picker-header [mode]="mode()" />
    }
</header>
<section
    tuiSlides
    class="t-slides"
>
    <tui-carousel
        [index]="index()"
        [max]="max().year * 12 + max().month"
        [min]="min().year * 12 + min().month"
        (indexChange)="month.set(getMonth(index() + ($event - index()) * months()))"
    >
        <ng-container *tuiItem="let current">
            @for (_ of '-'.repeat(months()); track $index) {
                @let month = index() + (current - index()) * months() + $index | tuiMapper: getMonth;
                <div class="t-calendar">
                    <div class="t-header">{{ i18n()[month.month] }} {{ month.year }}</div>
                    <tui-month
                        [content]="contentDay()"
                        [dayType]="dayType()"
                        [disabledItemHandler]="disabledDay()"
                        [month]="month"
                        [showAdjacent]="false"
                        [showWeek]="showWeek()"
                        [value]="value()"
                        (pick)="onDay($event)"
                    />
                </div>
            }
        </ng-container>
    </tui-carousel>
</section>
