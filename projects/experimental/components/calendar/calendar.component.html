@for (day of week(); track $index) {
    <span>{{ day }}</span>
}
@for (week of month() | tuiCalendarSheet: true; track week) {
    @for (day of week; track day) {
        <button
            tabindex="-1"
            type="button"
            class="t-day"
            [attr.data-range]="getRange(day)"
            [attr.data-type]="day | tuiMapper: dayType"
            [class.t-day_adjacent]="day.month !== month().month"
            [class.t-day_end]="$last"
            [class.t-day_start]="$first"
            [class.t-day_today]="day.daySame(today)"
            [disabled]="disabledItemHandler()(day)"
            (click)="pick.emit(day)"
            (mouseenter)="hovered.set(day)"
            (pointerdown.prevent.zoneless)="(0)"
        >
            {{ day.day }}
        </button>
    }
}
