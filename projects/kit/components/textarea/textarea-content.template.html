@if (!isMobile) {
    <tui-scroll-controls
        class="t-scroll"
        (click.prevent)="(0)"
    />
}
<span
    #text
    aria-hidden="true"
    class="t-ghost"
>
    <ng-container *polymorpheusOutlet="host.content() as text; context: {$implicit: textfield.value()}">
        {{ text }}
    </ng-container>
</span>
