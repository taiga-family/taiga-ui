@if (!host.isMobile) {
    <tui-scroll-controls
        class="t-scroll"
        (click.prevent)="(0)"
    />
}
<span
    #text
    aria-hidden="true"
    class="t-ghost"
    [style.max-height.em]="1.25 * host.max()"
    [style.min-height.em]="1.25 * host.min()"
>
    <ng-container *polymorpheusOutlet="host.content() as text; context: {$implicit: host.el.value}">
        {{ text }}
    </ng-container>
</span>
