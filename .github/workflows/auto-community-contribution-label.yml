name: 🤖 Community contribution
on:
  pull_request_target:
    types: [closed]

jobs:
  add-label:
    if: github.event.pull_request.merged == true && github.event.pull_request.head.repo.fork == true
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: taiga-family/actions/auto-label-community-contribution@cae818be1384ee5c94f69548d70ab1f50a8e7f01 # v2.2.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pr-number: ${{ github.event.pull_request.number }}
          label-name: community contribution
