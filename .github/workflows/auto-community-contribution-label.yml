name: 🤖 Community contribution
on:
  pull_request_target:
    types: [closed]

jobs:
  add-label:
    if: github.event.pull_request.merged == true && github.event.pull_request.head.repo.fork == true
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: taiga-family/ci/actions/auto/label-community-contribution@e768d782c3d60b207662078743ee0f8d6d2c765f # v1.207.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pr-number: ${{ github.event.pull_request.number }}
          label-name: community contribution
