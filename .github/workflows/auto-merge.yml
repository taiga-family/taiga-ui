name: 🤖 PR auto merge
on:
  pull_request:

permissions:
  actions: read
  contents: read
  pull-requests: write

env:
  PR_JOBS_NAME: '[ "Build packages", "Firebase", "Lint", "Tests result", "E2E result" ]'
  RELEASE_JOBS_NAME: '[ "Publish" ]'

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.value }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: taiga-family/actions/setup-variables@6b70ab6d36d96e388bdaf4158e6dd841430abe23 # v2.3.0
      - id: matrix
        if: env.IS_TAIGA_FAMILY_BOT_PR_AUTHOR == 'true'
        run: |
          if [[ "${{ env.IS_RELEASE_BRANCH }}" == "false" ]]; then
              echo "value=$PR_JOBS_NAME" >> $GITHUB_OUTPUT
          else
            echo "value=$RELEASE_JOBS_NAME" >> $GITHUB_OUTPUT
          fi

  wait:
    needs: [setup]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        value: ${{ fromJSON(needs.setup.outputs.matrix || '[]') }}
    steps:
      - uses: taiga-family/actions/wait-job@6b70ab6d36d96e388bdaf4158e6dd841430abe23 # v2.3.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          job: ${{ matrix.value }}

  approve:
    needs: [wait]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: taiga-family/actions/setup-variables@6b70ab6d36d96e388bdaf4158e6dd841430abe23 # v2.3.0
      - uses: taiga-family/actions/auto-approve-double@6b70ab6d36d96e388bdaf4158e6dd841430abe23 # v2.3.0
        if: env.IS_TAIGA_FAMILY_BOT_PR_AUTHOR == 'true' && github.event.pull_request.commits == 1
        with:
          token1: ${{ secrets.GITHUB_TOKEN }}
          token2: ${{ secrets.TAIGA_FAMILY_APPROVE_BOT_PAT }}
      - uses: taiga-family/actions/auto-merge@6b70ab6d36d96e388bdaf4158e6dd841430abe23 # v2.3.0
        if: env.IS_TAIGA_FAMILY_BOT_PR_AUTHOR == 'true' && github.event.pull_request.commits == 1
        with:
          token: ${{ secrets.TAIGA_FAMILY_BOT_PAT }}
          merge-method: ${{ (contains(github.head_ref, 'release/') && 'merge') || 'squash' }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
