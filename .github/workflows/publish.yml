name: ⚠️ Publish Taiga UI packages
on:
  push:
    branches: ['release/*']

permissions:
  contents: read

env:
  NX_DISABLE_NX_CACHE: true
  NX_DISABLE_REMOTE_CACHE: true

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - uses: taiga-family/actions/setup-variables@5b954545ec33833478961976b2ce4fd3c6b89149 # v2.7.0
      - uses: taiga-family/actions/setup-node@5b954545ec33833478961976b2ce4fd3c6b89149 # v2.7.0
      - uses: taiga-family/actions/setup-npm@5b954545ec33833478961976b2ce4fd3c6b89149 # v2.7.0
        with:
          token: ${{ secrets.TAIGA_UI_SCOPE_NPM_TOKEN }}

      - run: npx nx run-many -t publish

      - uses: taiga-family/actions/read-package-json@5b954545ec33833478961976b2ce4fd3c6b89149 # v2.7.0
        id: info

      - name: Announce to Time messenger
        uses: taiga-family/actions/messenger-mattermost-announce@5b954545ec33833478961976b2ce4fd3c6b89149 # v2.7.0
        if: ${{ !contains(steps.info.outputs.version, 'rc') }}
        with:
          url: ${{ secrets.ANNOUNCE_WEBHOOK }}
          channel: ${{ secrets.ANNOUNCE_TARGET }}
          version: v${{ steps.info.outputs.version }}

      - name: Announce to Telegram messenger
        uses: taiga-family/actions/messenger-telegram-announce@5b954545ec33833478961976b2ce4fd3c6b89149 # v2.7.0
        if: ${{ !contains(steps.info.outputs.version, 'rc') }}
        with:
          chatId: ${{ secrets.TAIGA_TELEGRAM_CHAT_ID }}
          topicId: ${{ secrets.TAIGA_TELEGRAM_CHAT_THREAD_ID }}
          token: ${{ secrets.TAIGA_TELEGRAM_BOT_TOKEN }}
          version: v${{ steps.info.outputs.version }}
          textLink: '@taiga-ui/cdk'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
