name: ⚙️ Build
on:
  pull_request:
  push:
    branches: [main]

env:
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}

jobs:
  libs:
    if: ${{ !contains(github.head_ref, 'release/') }}
    name: Build packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.3.0
      - uses: taiga-family/ci/actions/setup/variables@v1.152.0
      - uses: taiga-family/ci/actions/setup/node@v1.152.0
      - run: npm run run-many:build:libs
      - run: npx ts-node ./scripts/check-dist.ts

  demo:
    if: ${{ !contains(github.head_ref, 'release/') }}
    name: Prerender of demo application
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.3.0
      - uses: taiga-family/ci/actions/setup/variables@v1.152.0
      - name: Pre install diagnostics + verbose npm ci (before setup/node)
        run: |
          echo '=== PRE INSTALL (BEFORE setup/node) DIAGNOSTICS + VERBOSE INSTALL ==='
          date -Iseconds
          uname -a || true
          echo '--- Disk (before) ---'
          df -h
          echo '--- Memory (before) ---'
          free -h || true
          echo '--- Node / npm (runner default) ---'
          node -v || true
          npm -v || true
          echo '--- Nx Env ---'
          npx nx --version || true
          echo '--- Existing dist/demo (if any) ---'
          ls -R dist/demo | head -n 100 || echo 'dist/demo does not exist yet'
          echo '--- Top level repo size summary (du -sh *) ---'
          du -sh * 2>/dev/null | sort -h | tail -n 20 || true
          echo '--- package-lock.json size & hash ---'
          test -f package-lock.json && wc -c package-lock.json || echo 'No lockfile'
          test -f package-lock.json && (sha256sum package-lock.json 2>/dev/null || shasum -a 256 package-lock.json) || true
          echo '--- Network check registry.npmjs.org ---'
          curl -I --max-time 15 https://registry.npmjs.org/ || true
          ping -c 2 registry.npmjs.org || true
          echo '--- Existing node_modules dir ---'
          ls -ld node_modules || echo 'node_modules does not exist'
          echo '--- BEGIN VERBOSE npm ci (debug pre-run under default runner Node) ---'
          START_INSTALL_TS=$(date +%s)
          # Use increased network timeouts to surface slow network issues explicitly
          npm set fetch-retries 5
          npm set fetch-retry-mintimeout 20000
            npm set fetch-retry-maxtimeout 120000
          npm set registry https://registry.npmjs.org/
          npm ci --verbose 2>&1 | tee npm-ci-preinstall.log || INSTALL_RC=$?
          END_INSTALL_TS=$(date +%s)
          echo "--- VERBOSE npm ci duration: $((END_INSTALL_TS-START_INSTALL_TS))s ---"
          test -n "$INSTALL_RC" && echo "npm ci (pre-run) failed with code $INSTALL_RC (continuing so setup/node can retry)" || echo 'npm ci (pre-run) succeeded'
          echo '--- npm cache statistics ---'
          npm cache verify || true
          echo '--- Stored npm-debug / logs (if any) ---'
          ls -l npm-ci-preinstall.log || true
          echo '--- Top-level node_modules after pre-run ---'
          find node_modules -maxdepth 1 -type d | wc -l || true
          du -h -d 1 node_modules 2>/dev/null | sort -hr | head -n 25 || true
          echo '=== END PRE INSTALL VERBOSE PHASE ==='
      - uses: taiga-family/ci/actions/setup/node@v1.152.0
      - name: Post install diagnostics (after setup/node)
        if: always()
        run: |
          echo '=== POST INSTALL (AFTER setup/node) DIAGNOSTICS ==='
          date -Iseconds
          echo '--- Disk ---'
          df -h
          echo '--- Memory ---'
          free -h || true
          echo '--- Node / npm (requested version) ---'
          node -v
          npm -v
          echo '--- npm registry ---'
          npm config get registry || true
          echo '--- node_modules count ---'
          find node_modules -maxdepth 1 -type d | wc -l || true
          echo '--- Largest 25 node_modules dirs ---'
          du -h -d 1 node_modules 2>/dev/null | sort -hr | head -n 25 || true
      - name: Pre prerender diagnostics
        run: |
          echo '=== PRE PRERENDER DIAGNOSTICS (AFTER INSTALL) ==='
          date -Iseconds
          echo '--- Free disk & memory snapshot ---'
          df -h
          free -h || true
          echo '--- dist/demo still absent? ---'
          test -d dist/demo && ls -R dist/demo | head -n 50 || echo 'dist/demo not created yet'
      - name: Prerender demo (verbose)
        run: |
          echo '=== START PRERENDER ==='
          START_TS=$(date +%s)
          npx nx prerender demo --verbose || { echo 'Prerender failed'; exit 1; }
          END_TS=$(date +%s)
          echo "Prerender duration: $((END_TS-START_TS))s"
          echo '=== END PRERENDER ==='
      - name: Post prerender diagnostics
        if: always()
        run: |
          echo '=== POST PRERENDER DIAGNOSTICS ==='
          date -Iseconds
          echo '--- Disk (after) ---'
          df -h
          echo '--- Memory (after) ---'
          free -h || true
          echo '--- dist/demo size ---'
          du -sh dist/demo || echo 'dist/demo missing'
          echo '--- Largest 30 items in dist/demo ---'
          du -h -d 3 dist/demo 2>/dev/null | sort -hr | head -n 30 || true
          echo '--- Open TCP sockets snapshot ---'
          ss -tuna | head || true
      - run: npx --yes bundlemon --config .github/.bundlemonrc.json
        continue-on-error: true
        env:
          CI_COMMIT_SHA: ${{ env.CI_COMMIT_SHA }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
