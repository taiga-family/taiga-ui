name: ⚙️ Schematics
on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/schematic.yml'
      - '**/taiga-schematics/**'
      - '**/schematics/**'

permissions:
  contents: read
  pull-requests: write

env:
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}

jobs:
  schematics:
    if: ${{ !contains(github.head_ref , 'release/') }}
    runs-on: ubuntu-latest
    name: Run the latest migration
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: taiga-family/ci/actions/setup/node@v1.200.0
      - uses: taiga-family/ci/actions/run/node-info@v1.200.0
        id: info
      - name: Run schematics and measure time
        id: schematics
        run: |
          START=$(date +%s)
          LOG=$(npx nx run cdk:schematics --v=${{ steps.info.outputs.root-package-major-version }} 2>&1)
          EXIT_CODE=$?
          END=$(date +%s)
          DURATION=$((END - START))
          echo "duration=${DURATION}" >> $GITHUB_OUTPUT
          echo "$LOG" | sed 's/\x1b\[[0-9;]*m//g' | sed -n '/> schematics \.\/dist\/cdk/,$p' | sed '/^\s*UPDATE /,$d' > schematics.log
          exit $EXIT_CODE

      - name: Post performance comment
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        env:
          SCHEMATICS_DURATION: ${{ steps.schematics.outputs.duration }}
        with:
          script: |
            const duration = process.env.SCHEMATICS_DURATION;
            const raw = require('fs').readFileSync('schematics.log', 'utf8');
            const MAX = 60000;
            const log = raw.length <= MAX
              ? raw
              : raw.slice(0, MAX / 2) + '\n\n...\n\n' + raw.slice(-MAX / 2);
            const marker = '## ⚙️ Schematics Performance';
            const body = [
              marker,
              `**Duration:** ${duration}s`,
              ``,
              `<details>`,
              `<summary>📋 Full log</summary>`,
              ``,
              `\`\`\``,
              log,
              `\`\`\``,
              `</details>`,
            ].join('\n');
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.data.find(c => c.body.startsWith(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
