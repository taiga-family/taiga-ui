name: Deploy / preview
on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  build_and_preview:
    if: ${{ !contains(github.head_ref || github.ref_name, 'release/') }}
    name: GitHub Pages preview
    runs-on: ubuntu-latest
    env:
      PREVIEW_REPOSITORY: taiga-family/deploy-demo
      PREVIEW_BRANCH: main
      PREVIEW_BASE_URL: taiga-family.github.io/deploy-demo
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: taiga-family/actions/setup-variables@6b70ab6d36d96e388bdaf4158e6dd841430abe23 # v2.3.0

      - uses: taiga-family/actions/setup-node@6b70ab6d36d96e388bdaf4158e6dd841430abe23 # v2.3.0
        if: github.event.action != 'closed'

      - name: Build demo
        if: github.event.action != 'closed'
        run: |
          npx nx build demo --base-href="/deploy-demo/pr-preview/pr-${PR_NUMBER}/"

      - name: Deploy preview
        id: preview
        uses: rossjrw/pr-preview-action@v1
        if: env.IS_OWNER_MODE == 'true'
        with:
          source-dir: dist/demo/browser
          deploy-repository: ${{ env.PREVIEW_REPOSITORY }}
          preview-branch: ${{ env.PREVIEW_BRANCH }}
          umbrella-dir: pr-preview
          pr-number: ${{ env.PR_NUMBER }}
          pages-base-url: ${{ env.PREVIEW_BASE_URL }}
          action: auto
          wait-for-pages-deployment: true
          comment: true
          qr-code: false
          token: ${{ secrets.TAIGA_FAMILY_BOT_PAT }}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
